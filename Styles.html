<style>
  :root {
    --ink: #14202b;
    --muted: #667789;
    --line: #d8e0e8;
    --paper: #f6f8fb;
    --panel: #ffffff;
    --brand: #123f68;
    --brand-dark: #0c2b49;
    --accent: #c7962e;
    --success: #1d7c55;
    --danger: #b33a3a;
    --shadow: 0 22px 60px rgba(20, 32, 43, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    background: var(--paper);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .app-shell {
    display: grid;
    grid-template-columns: 292px minmax(0, 1fr);
    min-height: 100vh;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 28px;
    padding: 28px;
    color: #f8fbff;
    background: linear-gradient(180deg, var(--brand-dark), #173f4f 58%, #274638);
  }

  .brand-block {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-mark {
    display: grid;
    width: 48px;
    height: 48px;
    place-items: center;
    border: 1px solid rgba(255, 255, 255, 0.32);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.1);
    color: #ffe4a3;
    font-weight: 800;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  p {
    margin-top: 0;
  }

  .brand-block h1 {
    margin-bottom: 0;
    font-size: 20px;
    line-height: 1.2;
  }

  .eyebrow {
    margin-bottom: 5px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .nav-tabs {
    display: grid;
    gap: 10px;
  }

  .nav-tab {
    min-height: 46px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: #f7fbff;
    text-align: left;
    padding: 0 14px;
  }

  .nav-tab.active {
    border-color: rgba(255, 228, 163, 0.62);
    background: rgba(255, 228, 163, 0.18);
  }

  .sidebar-note {
    margin-top: auto;
    display: grid;
    gap: 6px;
    padding: 16px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: #dbe7ef;
    font-size: 13px;
    line-height: 1.45;
  }

  .workspace {
    min-width: 0;
    padding: 32px;
  }

  .topbar,
  .page-heading,
  .form-actions,
  .result-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
  }

  .topbar {
    margin-bottom: 24px;
  }

  .topbar h2 {
    margin-bottom: 0;
    font-size: 30px;
    line-height: 1.1;
  }

  .status-pill {
    min-width: 152px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--panel);
    color: var(--muted);
    padding: 9px 14px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
  }

  .status-pill.ready {
    border-color: rgba(29, 124, 85, 0.25);
    color: var(--success);
    background: #eaf7f1;
  }

  .status-pill.warning {
    border-color: rgba(179, 58, 58, 0.24);
    color: var(--danger);
    background: #fff0f0;
  }

  .page {
    display: none;
  }

  .page.active {
    display: block;
  }

  .page-heading {
    margin-bottom: 18px;
  }

  .page-heading h3 {
    margin-bottom: 0;
    font-size: 22px;
  }

  .page-heading p {
    margin: 6px 0 0;
    color: var(--muted);
  }

  .profile-form,
  .lookup-results {
    display: grid;
    gap: 18px;
  }

  .form-section,
  .result-card,
  .lookup-panel {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: var(--shadow);
  }

  .form-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
  }

  .form-section-header h4,
  .result-card h4 {
    margin-bottom: 0;
    font-size: 16px;
  }

  .section-count {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .fields-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    padding: 20px;
  }

  .field,
  .lookup-panel label {
    display: grid;
    gap: 7px;
  }

  .field.wide {
    grid-column: 1 / -1;
  }

  .field span,
  .lookup-panel span {
    color: #304050;
    font-size: 13px;
    font-weight: 800;
  }

  .field small {
    color: var(--muted);
    font-size: 12px;
  }

  input,
  select,
  textarea {
    width: 100%;
    border: 1px solid #cfd9e3;
    border-radius: 7px;
    background: #fbfdff;
    color: var(--ink);
    padding: 11px 12px;
    outline: none;
  }

  textarea {
    min-height: 92px;
    resize: vertical;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(18, 63, 104, 0.12);
  }

  .form-actions {
    position: sticky;
    bottom: 0;
    margin-top: 18px;
    padding: 16px 0 0;
    background: var(--paper);
  }

  .primary-button,
  .secondary-button {
    min-height: 44px;
    border-radius: 8px;
    padding: 0 18px;
    font-weight: 800;
  }

  .primary-button {
    border: 1px solid var(--brand-dark);
    background: var(--brand);
    color: #fff;
  }

  .primary-button:hover {
    background: var(--brand-dark);
  }

  .primary-button:disabled {
    cursor: wait;
    opacity: 0.72;
  }

  .secondary-button {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--brand);
  }

  .form-message {
    min-height: 20px;
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
  }

  .form-message.success {
    color: var(--success);
  }

  .form-message.error {
    color: var(--danger);
  }

  .lookup-panel {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr)) auto;
    align-items: end;
    gap: 14px;
    padding: 18px;
  }

  .lookup-results {
    margin-top: 18px;
  }

  .result-card {
    overflow: hidden;
  }

  .result-summary {
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
    background: #fbfdff;
  }

  .result-summary p {
    margin: 5px 0 0;
    color: var(--muted);
  }

  .detail-section {
    padding: 16px 20px 20px;
  }

  .detail-section + .detail-section {
    border-top: 1px solid var(--line);
  }

  .detail-section h5 {
    margin-bottom: 12px;
    color: var(--brand);
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px 18px;
  }

  .detail-item {
    display: grid;
    gap: 4px;
    min-width: 0;
  }

  .detail-item strong {
    color: var(--muted);
    font-size: 12px;
  }

  .detail-item span {
    overflow-wrap: anywhere;
    line-height: 1.45;
  }

  @media (max-width: 980px) {
    .app-shell {
      grid-template-columns: 1fr;
    }

    .sidebar {
      padding: 20px;
    }

    .nav-tabs {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .sidebar-note {
      display: none;
    }

    .workspace {
      padding: 22px;
    }
  }

  @media (max-width: 720px) {
    .topbar,
    .page-heading,
    .result-summary,
    .form-actions {
      align-items: stretch;
      flex-direction: column;
    }

    .fields-grid,
    .lookup-panel,
    .detail-grid {
      grid-template-columns: 1fr;
    }

    .topbar h2 {
      font-size: 25px;
    }

    .primary-button,
    .secondary-button {
      width: 100%;
    }
  }
</style>
